services:
  poe-tools:
    build: .
    container_name: poe-tools
    restart: unless-stopped
    environment:
      - POE2_NO_OPEN=1
      - HOST=0.0.0.0
      - POE_CONTACT=REDACTED-USER
      - DATA_DIR=/app/data
    ports:
      - "17777:17777"
    # CODE: no bind mounts on purpose. The image (Dockerfile `COPY . .`) is the
    # single source of truth, so `docker compose up -d --build` always serves a
    # fully consistent file set. The old partial mounts (only server.js +
    # index.html) let `git pull` refresh those two files while every other asset
    # (theme.css, tool css/js, fonts/) stayed baked at the last build — silently
    # serving a stale, unstyled site.
    # DATA: runtime state (economy-history graph, caches, rate-limit safety) is
    # written to DATA_DIR=/app/data on this named volume so a `--build` redeploy
    # (which recreates the container and drops its writable layer) doesn't wipe it.
    # Deploy = `git pull && docker compose up -d --build`.
    volumes:
      - poe-data:/app/data

volumes:
  poe-data:
