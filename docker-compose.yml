services:
  poe-tools:
    build: .
    container_name: poe-tools
    restart: unless-stopped
    environment:
      - POE2_NO_OPEN=1
      - HOST=0.0.0.0
      - POE_CONTACT=REDACTED-USER
      - OCR_DEBUG=1
    ports:
      - "17777:17777"
    volumes:
      - ./server.js:/app/server.js:ro
      - ./index.html:/app/index.html:ro
